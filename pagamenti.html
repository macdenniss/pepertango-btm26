<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamenti — Brutia Tango Fest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #f8f9fa; --text: #1a1a1a; --border: #cccccc; --red: #BD081C; --gold: #d4a574; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: linear-gradient(135deg, #f0f2f5 0%, #ffffff 100%);
      border-right: 1px solid var(--border);
      padding: 2rem 0;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 280px;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 0 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .nav-menu {
      list-style: none;
      padding: 0 1rem;
    }
    .nav-item { margin-bottom: 0.5rem; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      color: #666;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: all 0.3s;
      border-left: 3px solid transparent;
    }
    .nav-link:hover {
      background: #e9ecef;
      color: var(--text);
      border-left-color: var(--red);
    }
    .nav-link.active {
      background: rgba(189, 8, 28, 0.1);
      color: var(--red);
      border-left-color: var(--red);
    }
    .main { grid-column: 2; padding: 2rem; overflow-y: auto; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 2rem; border-bottom: 2px solid var(--red); padding-bottom: 1rem; }
    .header h1 { font-size: 2rem; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .stat-box { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .stat-label { color: #666; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--red); }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th { background: #f0f0f0; padding: 1rem; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border); color: var(--red); }
    td { padding: 1rem; border-bottom: 1px solid var(--border); }
    tr:hover { background: #f9f9f9; }
    .badge {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .badge-paid { background: rgba(74,222,128,0.1); color: #4ade80; }
    .badge-pending { background: rgba(249,115,22,0.1); color: #f97316; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">💃 BRUTIA</div>
      <div class="tagline">Tango Fest</div>
    </div>
    <nav>
      <ul class="nav-menu">
        <li class="nav-item"><a href="Dashboard_Brutia.html" class="nav-link">📊 Dashboard</a></li>
        <li class="nav-item"><a href="iscritti.html" class="nav-link">👥 Iscritti</a></li>
        <li class="nav-item"><a href="pagamenti.html" class="nav-link active">💳 Pagamenti</a></li>
        <li class="nav-item"><a href="camere.html" class="nav-link">🔑 Camere</a></li>
        <li class="nav-item"><a href="statistiche.html" class="nav-link">📈 Statistiche</a></li>
        <li class="nav-item"><a href="impostazioni.html" class="nav-link">⚙️ Impostazioni</a></li>
      </ul>
    </nav>
  </aside>

  <div class="main">
    <div class="container">
      <div class="header">
        <h1>💳 Pagamenti</h1>
      </div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-label">Totale Entrate</div>
          <div class="stat-value" id="totalEntrate">€0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Pagamenti Ricevuti</div>
          <div class="stat-value" id="totalPagati">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">In Attesa</div>
          <div class="stat-value" id="totalInAttesa">0</div>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Pacchetto</th>
            <th>Pagamento</th>
            <th>Stato</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" style="text-align:center; padding: 2rem;">Caricamento...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxR9UIIksKAZqLBkn14MoGumz-SQPR-Hll-A4ra5G8drwUtW7tsDtF_OpGR2sFLbasJbQ/exec';

    async function loadData() {
      try {
        const response = await fetch(APPS_SCRIPT_URL);
        const data = await response.json();

        const pagati = data.filter(r => r.pagamento === 'Saldato' || r.pagamento === 'Anticipo versato').length;
        const inAttesa = data.filter(r => !r.pagamento || r.pagamento === 'Non pagato').length;
        const entrate = pagati * 90;

        document.getElementById('totalEntrate').textContent = '€' + entrate;
        document.getElementById('totalPagati').textContent = pagati;
        document.getElementById('totalInAttesa').textContent = inAttesa;

        const tbody = document.getElementById('tbody');
        let html = '';
        data.forEach(r => {
          const isPaid = r.pagamento === 'Saldato' || r.pagamento === 'Anticipo versato';
          html += `<tr>
            <td>${r.nome || '—'}</td>
            <td>${r.email || '—'}</td>
            <td>${r.pacchetto || '—'}</td>
            <td><span class="badge ${isPaid ? 'badge-paid' : 'badge-pending'}">${r.pagamento || 'Non pagato'}</span></td>
            <td>${r.stato || 'In attesa'}</td>
          </tr>`;
        });
        tbody.innerHTML = html || '<tr><td colspan="5" style="text-align:center; padding: 2rem;">Nessun dato</td></tr>';
      } catch (error) {
        document.getElementById('tbody').innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 2rem;">Errore: ${error.message}</td></tr>`;
      }
    }

    loadData();
  </script>
</body>
</html>
