<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistiche — Brutia Tango Fest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #f8f9fa; --text: #1a1a1a; --red: #BD081C; --gold: #d4a574; --border: #cccccc; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: linear-gradient(135deg, #f0f2f5 0%, #ffffff 100%);
      border-right: 1px solid var(--border);
      padding: 2rem 0;
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 280px;
      overflow-y: auto;
    }
    .sidebar-header { padding: 0 1.5rem 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--red), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .tagline { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }
    .nav-menu { list-style: none; padding: 0 1rem; }
    .nav-item { margin-bottom: 0.5rem; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      color: #666;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: all 0.3s;
      border-left: 3px solid transparent;
    }
    .nav-link:hover { background: #e9ecef; color: var(--text); border-left-color: var(--red); }
    .nav-link.active { background: rgba(189, 8, 28, 0.1); color: var(--red); border-left-color: var(--red); }
    .main { grid-column: 2; padding: 2rem; overflow-y: auto; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 2rem; border-bottom: 2px solid var(--red); padding-bottom: 1rem; }
    .header h1 { font-size: 2rem; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }
    .stat-box { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .stat-label { color: #666; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .stat-value { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, var(--gold), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">💃 BRUTIA</div>
      <div class="tagline">Tango Fest</div>
    </div>
    <nav>
      <ul class="nav-menu">
        <li class="nav-item"><a href="Dashboard_Brutia.html" class="nav-link">📊 Dashboard</a></li>
        <li class="nav-item"><a href="iscritti.html" class="nav-link">👥 Iscritti</a></li>
        <li class="nav-item"><a href="pagamenti.html" class="nav-link">💳 Pagamenti</a></li>
        <li class="nav-item"><a href="camere.html" class="nav-link">🔑 Camere</a></li>
        <li class="nav-item"><a href="statistiche.html" class="nav-link active">📈 Statistiche</a></li>
        <li class="nav-item"><a href="impostazioni.html" class="nav-link">⚙️ Impostazioni</a></li>
      </ul>
    </nav>
  </aside>

  <div class="main">
    <div class="container">
      <div class="header">
        <h1>📈 Statistiche</h1>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Totale Iscritti</div>
          <div class="stat-value" id="total">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Leader 🕺</div>
          <div class="stat-value" id="leaders">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Follower 💃</div>
          <div class="stat-value" id="followers">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Accettati</div>
          <div class="stat-value" id="accepted">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">In Attesa</div>
          <div class="stat-value" id="waiting">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Camere</div>
          <div class="stat-value" id="rooms">0</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUEYI5iFcfOBVLnch6AH6m6wHmQ_y-UY5Qjpe24boPcg3yZec0KCvJpcrpHox61kkEjw/exec';

    async function loadData() {
      try {
        const response = await fetch(APPS_SCRIPT_URL);
        const data = await response.json();

        const total = data.length;
        const leaders = data.filter(r => r.ruolo === 'Leader').length;
        const followers = data.filter(r => r.ruolo === 'Follower').length;
        const accepted = data.filter(r => r.stato === 'Accettato').length;
        const waiting = data.filter(r => r.stato === 'In attesa').length;
        const rooms = new Set(data.filter(r => r.camera).map(r => r.camera)).size;

        document.getElementById('total').textContent = total;
        document.getElementById('leaders').textContent = leaders;
        document.getElementById('followers').textContent = followers;
        document.getElementById('accepted').textContent = accepted;
        document.getElementById('waiting').textContent = waiting;
        document.getElementById('rooms').textContent = rooms;
      } catch (error) {
        document.querySelector('.container').innerHTML = `<p>Errore: ${error.message}</p>`;
      }
    }

    loadData();
  </script>
</body>
</html>
